services:
  - type: web
    name: amazon-stock-tracker
    runtime: docker
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: PRODUCT_URL
        value: https://www.amazon.in/dp/B0G2GMN6Y6
      - key: ADDITIONAL_PRODUCT_URLS
        value: https://www.amazon.in/dp/B0CY5HVDS2,https://www.amazon.in/dp/B0CY5QW186,https://www.amazon.in/dp/B0B7CMZ3QH
      - key: CHECK_INTERVAL_MINUTES
        value: "15"
      - key: MAX_USERS
        value: "10"
      - key: MAX_PRODUCTS_PER_USER
        value: "5"
      - key: MAX_UNIQUE_CHECKS_PER_CYCLE
        value: "50"
      - key: MIN_CHECK_INTERVAL_MINUTES
        value: "15"
      - key: REDIS_URL
        sync: false
      # Optional. Leave unset to scrape directly from Render's own IP.
      # Set this (in the Render dashboard) to a residential/rotating proxy URL
      # only if Amazon starts blocking and scraper_healthy turns false.
      - key: PROXY_URL
        sync: false
