services:
  - type: web
    name: amazon-stock-tracker
    runtime: docker
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: PRODUCT_URL
        value: https://www.amazon.in/dp/B0G2GMN6Y6
      - key: CHECK_INTERVAL_MINUTES
        value: 15
      - key: TRACKER_URL
        sync: false
